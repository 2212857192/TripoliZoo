name: tripolizoo
description: "Tripoli Zoo - Official Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.6.2
  url_launcher: ^6.3.0
  mobile_scanner: ^5.1.0
  permission_handler: ^11.3.0
  qr_flutter: ^4.1.0
  google_fonts: ^6.2.1
  panorama_viewer: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/background.jpg
    - assets/images/main.PNG
    - assets/images/map_nav_icon.png
    - assets/images/zoo_map.png
    - assets/images/شعار.jpg
    - assets/images/image1.png
    - assets/images/image2.png
    - assets/images/Hello.jpg
    - assets/images/Hello2.jpg
    - assets/images/bear.jpg
    - assets/images/lion.jpg
    - assets/images/tiger.jpg
    - assets/images/flamengo.jpg
    - assets/images/panorama/
    - assets/images/panorama/marked/
